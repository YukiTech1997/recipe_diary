<!doctype html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="CodejumpのRecipe Diaryの模写コーディングです。">
  <title>Recipe Diary</title>
  <link rel="stylesheet" href="./src/css/style.css">
  <link rel="shortcut icon" href="./public/img/favicon.ico" type="image/x-icon">
</head>

<body>
  <!-- main_visual -->
  <div id="main_visual">
    <img src="./public/img/mainvisual.jpg" alt="サイトのメインビジュアル">
  </div>
  <!-- /main-visual -->
  <main>
    <!-- recipe_diary -->
    <section id="recipe_diary">
      <h1 class="site_title">Recipe Diary</h1>
      <p class="sec_text">
        日々の料理レシピをまとめています。<br>
        和食や洋食、中華、お菓子までいろいろな料理レシピをアップしていますので、<br>
        みなさんの献立にお役立てくださいね！<br>
      </p>
    </section>
    <!-- /recipe_diary -->
    <!-- recipe -->
    <div id="recipe">
      <div class="recipe_container">
        <img src="./public/img/recipe1.jpg" alt="レシピ">
        <img src="./public/img/recipe2.jpg" alt="レシピ">
        <img src="./public/img/recipe3.jpg" alt="レシピ">
      </div>
      <div class="recipe_btn_wrapper">
        <a href="#">レシピ一覧を見る</a>
      </div>
    </div>
    <!-- /recipe -->
  </main>
  <!-- footer -->
  <footer id="footer">
    <div class="footer_head">
      <a href="#">Instagram</a>
      <a href="#">Twitter</a>
      <a href="#">Facebook</a>
    </div>
    <div class="footer_body">
      <small class="footer_copy_right">
        &copy; 2026 Recipe Diary
      </small>
    </div>
  </footer>
  <!-- /footer -->
</body>

</html>
